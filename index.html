<!DOCTYPE html>
<html>
<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ALI GAMES OFFICIAL</title>

<style>

body{
    margin:0;
    min-height:100vh;
    overflow-x:hidden;
    font-family:Arial;
    text-align:center;
    background:linear-gradient(darkblue, black);
    color:white;
}

.star{
    position:absolute;
    color:gold;
    animation:twinkle 2s infinite;
    font-size:20px;
}

@keyframes twinkle{
    0%{opacity:0.2;}
    50%{opacity:1;}
    100%{opacity:0.2;}
}

.container{
    position:relative;
    z-index:2;
    padding:20px;
}

h1{
    font-size:60px;
    color:gold;
    text-shadow:0 0 20px yellow;
    margin-top:20px;
}

h2{
    color:cyan;
}

.gameButton{
    font-size:28px;
    padding:18px;
    width:320px;
    max-width:90%;
    margin:12px;
    border:none;
    border-radius:20px;
    cursor:pointer;
    transition:0.3s;
    font-weight:bold;
    box-shadow:0 0 20px rgba(255,255,255,0.4);
}

.gameButton:hover{
    transform:scale(1.05);
}

.logo{
    width:120px;
    margin-bottom:10px;
}

@media (max-width:600px){

    h1{
        font-size:40px;
    }

    h2{
        font-size:22px;
    }

    .gameButton{
        width:90%;
        font-size:22px;
        padding:16px;
    }

    p{
        font-size:18px;
    }

}

</style>

</head>

<body>

<div class="star" style="top:10%;left:10%">⭐</div>
<div class="star" style="top:20%;left:80%">⭐</div>
<div class="star" style="top:40%;left:20%">⭐</div>
<div class="star" style="top:60%;left:90%">⭐</div>
<div class="star" style="top:80%;left:15%">⭐</div>
<div class="star" style="top:70%;left:60%">⭐</div>
<div class="star" style="top:30%;left:50%">⭐</div>
<div class="star" style="top:90%;left:70%">⭐</div>

<div class="container">

<h1>🎮 ALI GAMES 🎮</h1>

<h2>Official Game Website</h2>

<button class="gameButton"
style="background:red;color:white;"
onclick="window.location.href='squaregame.html'">
🟥 Square Game
</button>

<br>

<button class="gameButton"
style="background:green;color:white;"
onclick="window.location.href='snake.html'">
🐍 Snake Game
</button>

<br>

<button class="gameButton"
style="background:gold;color:black;"
onclick="window.location.href='flappy.html'">
🐦 Flappy Bird
</button>

<br>

<button class="gameButton"
style="background:purple;color:white;"
onclick="window.location.href='chess.html'">
♟️ Chess
</button>

<br><br>

<h2 style="color:orange;">
NEW GAMES COMING SOON!
</h2>

<p>New games every Saturday!</p>

<p>Made by Muhammad Ali 😎</p>

</div>

</body>
</html>

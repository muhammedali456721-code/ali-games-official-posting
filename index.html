<!DOCTYPE html>
<html>

<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ALI GAMES OFFICIAL</title>

<style>

body{
    margin:0;
    padding-bottom:150px;
    overflow-x:hidden;
    overflow-y:auto;
    font-family:Arial;
    text-align:center;
    background:linear-gradient(darkblue, black);
    color:white;
}

.star{
    position:fixed;
    color:white;
    animation:twinkle 2s infinite;
    pointer-events:none;
}

@keyframes twinkle{

    0%{
        opacity:0.2;
    }

    50%{
        opacity:1;
    }

    100%{
        opacity:0.2;
    }
}

.logo{
    font-size:60px;
    color:gold;
    text-shadow:0 0 20px yellow;
    margin-top:30px;
}

.subtitle{
    color:cyan;
    font-size:28px;
}

.gameButton{

    width:90%;
    max-width:350px;

    font-size:28px;

    padding:20px;

    margin:15px;

    border:none;

    border-radius:20px;

    cursor:pointer;

    transition:0.3s;
}

.gameButton:hover{

    transform:scale(1.05);
}

.footer{

    margin-top:50px;

    color:orange;

    font-size:22px;
}

.credit{

    margin-top:40px;

    font-size:18px;
}

@media(max-width:600px){

    .logo{
        font-size:42px;
    }

    .subtitle{
        font-size:22px;
    }

    .gameButton{
        font-size:22px;
        width:92%;
    }
}

</style>

</head>

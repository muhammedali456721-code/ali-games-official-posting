    <style>

        body{
            margin:0;

            font-family:Arial;
            text-align:center;
            background:linear-gradient(darkblue, black);
            color:white;
        }

        .star{
            position:absolute;
            color:white;
            animation:twinkle 2s infinite;
        }

        @keyframes twinkle{
            0%{opacity:0.2;}
            50%{opacity:1;}
            100%{opacity:0.2;}
        }

        .gameButton{
            font-size:30px;
            padding:20px;
            width:320px;
            margin:15px;
            border:none;
            border-radius:20px;
            cursor:pointer;
            transition:0.3s;
        }

        .gameButton:hover{
            transform:scale(1.1);
        }

    </style>
</head>

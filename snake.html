```html
<!DOCTYPE html>
<html>

<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ALI SNAKE</title>

<style>

body{
    background:black;
    color:white;
    text-align:center;
    font-family:Arial;
    margin:0;
    padding-bottom:150px;
}

h1{
    color:lime;
    text-shadow:0 0 20px lime;
}

canvas{
    background:green;
    border:4px solid white;
    width:95vw;
    max-width:400px;
    height:auto;
}

button{
    font-size:20px;
    padding:12px 20px;
    margin:5px;
    border:none;
    border-radius:10px;
    cursor:pointer;
}

#controls{
    margin-top:15px;
}

.controlBtn{
    width:70px;
    height:70px;
    font-size:30px;
}

#gameOver{
    display:none;
    margin-top:20px;
}

</style>

</head>

<body>

<h1>🐍 ALI SNAKE 🐍</h1>

<h2>Score: <span id="score">0</span></h2>

<button id="startButton" onclick="startGame()">
▶ START GAME
</button>

<br><br>

<canvas id="game" width="400" height="400"></canvas>

<div id="controls">

<br>

<button class="controlBtn"
onclick="changeDirection('up')">
⬆️
</button>

<br>

<button class="controlBtn"
onclick="changeDirection('left')">
⬅️
</button>

<button class="controlBtn"
onclick="changeDirection('down')">
⬇️
</button>

<button class="controlBtn"
onclick="changeDirection('right')">
➡️
</button>

</div>

<div id="gameOver">

<h2>GAME OVER!</h2>

<button onclick="startGame()">
🔄 PLAY AGAIN
</button>

<button onclick="window.location.href='index.html'">
🏠 ALI GAMES
</button>

</div>

<script>

let canvas =
document.getElementById("game");

let ctx =
canvas.getContext("2d");

let snake = [];

let dx = 20;
let dy = 0;

let foodX = 100;
let foodY = 100;

let score = 0;

let game;

function startGame(){

    snake = [
        {x:200,y:200},
        {x:180,y:200},
        {x:160,y:200}
    ];

    dx = 20;
    dy = 0;

    score = 0;

    document.getElementById(
        "score"
    ).innerHTML = score;

    document.getElementById(
        "gameOver"
    ).style.display = "none";

    clearInterval(game);

    game = setInterval(draw,150);

    newFood();
}

function newFood(){

    foodX =
    Math.floor(Math.random()*20)*20;

    foodY =
    Math.floor(Math.random()*20)*20;
}

document.addEventListener(
    "keydown",
    function(event){

        if(event.key=="ArrowUp" && dy==0){
            dx=0;
            dy=-20;
        }

        if(event.key=="ArrowDown" && dy==0){
            dx=0;
            dy=20;
        }

        if(event.key=="ArrowLeft" && dx==0){
            dx=-20;
            dy=0;
        }

        if(event.key=="ArrowRight" && dx==0){
            dx=20;
            dy=0;
        }
    }
);

function changeDirection(dir){

    if(dir=="up" && dy==0){
        dx=0;
        dy=-20;
    }

    if(dir=="down" && dy==0){
        dx=0;
        dy=20;
    }

    if(dir=="left" && dx==0){
        dx=-20;
        dy=0;
    }

    if(dir=="right" && dx==0){
        dx=20;
        dy=0;
    }
}

function draw(){

    ctx.fillStyle = "green";

    ctx.fillRect(
        0,
        0,
        400,
        400
    );

    let head = {

        x:snake[0].x + dx,

        y:snake[0].y + dy

    };

    snake.unshift(head);

    if(
        head.x == foodX &&
        head.y == foodY
    ){

        score++;

        document.getElementById(
            "score"
        ).innerHTML = score;

        newFood();

    }else{

        snake.pop();

    }

    ctx.fillStyle = "red";

    ctx.fillRect(
        foodX,
        foodY,
        20,
        20
    );

    for(let i=0;i<snake.length;i++){

        if(i==0){

            ctx.fillStyle =
            "yellow";

        }else{

            ctx.fillStyle =
            "lime";

        }

        ctx.fillRect(

            snake[i].x,

            snake[i].y,

            20,

            20

        );
    }

    if(

        head.x < 0 ||

        head.x >= 400 ||

        head.y < 0 ||

        head.y >= 400

    ){

        gameOver();

    }

    for(let i=1;i<snake.length;i++){

        if(

            head.x ==
            snake[i].x &&

            head.y ==
            snake[i].y

        ){

            gameOver();

        }
    }
}

function gameOver(){

    clearInterval(game);

    document.getElementById(
        "gameOver"
    ).style.display = "block";
}

</script>

</body>

</html>

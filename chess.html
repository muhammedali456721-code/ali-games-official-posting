```html
<!DOCTYPE html>
<html>

<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ALI CHESS</title>

<style>

body{
    margin:0;
    background:linear-gradient(darkblue,black);
    color:white;
    text-align:center;
    font-family:Arial;
}

h1{
    color:gold;
    text-shadow:0 0 20px yellow;
}

#turn{
    color:cyan;
}

#board{
    width:95vw;
    max-width:560px;
    margin:auto;
    display:grid;
    grid-template-columns:repeat(8,1fr);
    border:4px solid white;
    box-shadow:0 0 20px white;
}

.square{
    aspect-ratio:1;
    display:flex;
    justify-content:center;
    align-items:center;
    font-size:40px;
    cursor:pointer;
    user-select:none;
}

.white{
    background:#f0d9b5;
}

.black{
    background:#b58863;
}

.selected{
    background:yellow !important;
}

button{
    margin-top:20px;
    font-size:20px;
    padding:12px 20px;
    border:none;
    border-radius:10px;
}

@media(max-width:600px){

    .square{
        font-size:28px;
    }

}

</style>
</head>

<body>

<h1>♟️ ALI CHESS ♟️</h1>

<h2 id="turn">White's Turn</h2>

<div id="board"></div>

<button onclick="window.location.href='index.html'">
🏠 ALI GAMES
</button>

<script>

let board = [

["♜","♞","","","","","♞","♜"],
["♟","♟","♟","♟","♟","♟","♟","♟"],
["","","","","","","",""],
["","","","","","","",""],
["","","","","","","",""],
["","","","","","","",""],
["♙","♙","♙","♙","♙","♙","♙","♙"],
["♖","♘","","","","","♘","♖"]

];

let selected = null;
let whiteTurn = true;

function isWhite(piece){
    return "♔♕♖♗♘♙".includes(piece);
}

function isBlack(piece){
    return "♚♛♜♝♞♟".includes(piece);
}

function legalMove(sr,sc,r,c,piece){

    let dr = r - sr;
    let dc = c - sc;

    if(piece=="♙"){

        if(sc==c && dr==-1 && board[r][c]=="")
            return true;

        if(sr==6 &&
           sc==c &&
           dr==-2 &&
           board[5][c]=="" &&
           board[4][c]=="")
            return true;

        if(Math.abs(dc)==1 &&
           dr==-1 &&
           isBlack(board[r][c]))
            return true;
    }

    if(piece=="♟"){

        if(sc==c && dr==1 && board[r][c]=="")
            return true;

        if(sr==1 &&
           sc==c &&
           dr==2 &&
           board[2][c]=="" &&
           board[3][c]=="")
            return true;

        if(Math.abs(dc)==1 &&
           dr==1 &&
           isWhite(board[r][c]))
            return true;
    }

    if(piece=="♘" || piece=="♞"){

        if(
            (Math.abs(dr)==2 && Math.abs(dc)==1) ||
            (Math.abs(dr)==1 && Math.abs(dc)==2)
        ){
            return true;
        }
    }

    if(piece=="♖" || piece=="♜"){

        if(sr==r || sc==c)
            return true;
    }

    return false;
}

function clickSquare(r,c){

    let piece = board[r][c];

    if(selected==null){

        if(piece=="") return;

        if(whiteTurn && !isWhite(piece))
            return;

        if(!whiteTurn && !isBlack(piece))
            return;

        selected = {
            row:r,
            col:c
        };

    }else{

        if(
            selected.row==r &&
            selected.col==c
        ){
            selected = null;
            drawBoard();
            return;
        }

        let moving =
        board[selected.row][selected.col];

        let target =
        board[r][c];

        if(
            isWhite(moving) &&
            isWhite(target)
        ){
            selected = null;
            drawBoard();
            return;
        }

        if(
            isBlack(moving) &&
            isBlack(target)
        ){
            selected = null;
            drawBoard();
            return;
        }

        if(
            legalMove(
                selected.row,
                selected.col,
                r,
                c,
                moving
            )
        ){

            board[r][c] = moving;

            board[selected.row][selected.col] = "";

            whiteTurn = !whiteTurn;

            document.getElementById("turn").innerHTML =
            whiteTurn ?
            "White's Turn" :
            "Black's Turn";
        }

        selected = null;
    }

    drawBoard();
}

function drawBoard(){

    let b =
    document.getElementById("board");

    b.innerHTML = "";

    for(let r=0;r<8;r++){

        for(let c=0;c<8;c++){

            let sq =
            document.createElement("div");

            sq.classList.add("square");

            if((r+c)%2==0)
                sq.classList.add("white");
            else
                sq.classList.add("black");

            if(
                selected &&
                selected.row==r &&
                selected.col==c
            ){
                sq.classList.add("selected");
            }

            sq.innerHTML = board[r][c];

            sq.onclick = function(){

                clickSquare(r,c);

            };

            b.appendChild(sq);
        }
    }
}

drawBoard();

</script>

</body>
</html>

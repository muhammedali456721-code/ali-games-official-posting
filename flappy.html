<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ALI FLAPPY BIRD</title>

<style>

body{
    margin:0;
    background:linear-gradient(skyblue,#87CEEB);
    text-align:center;
    font-family:Arial;
    overflow:hidden;
    touch-action:none;
}

h1{
    color:gold;
    text-shadow:0 0 10px yellow;
    margin:10px;
}

canvas{
    border:4px solid black;
    background:skyblue;
    width:95vw;
    max-width:400px;
    height:auto;
    touch-action:none;
}

#menu{
    display:none;
    margin-top:10px;
}

button{
    font-size:20px;
    padding:12px 20px;
    margin:5px;
    border:none;
    border-radius:10px;
    cursor:pointer;
}

</style>
</head>

<body>

<h1>🐦 ALI FLAPPY BIRD 🐦</h1>

<p>Tap to Jump!</p>

<canvas id="game" width="400" height="600"></canvas>

<div id="menu">
    <h2>Game Over!</h2>

    <button onclick="restartGame()">
        🔄 Play Again
    </button>

    <button onclick="window.location.href='index.html'">
        🏠 ALI GAMES
    </button>
</div>

<script>

const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

let bird;
let pipes;
let score;
let gameOver;

let gravity = 0.45;
let jumpPower = -9;

let pipeTimer = 0;
let pipeDelay = 120;

function startGame(){

    bird = {
        x:80,
        y:300,
        size:18,
        velocity:0
    };

    pipes = [];

    score = 0;

    pipeTimer = 0;

    gameOver = false;

    document.getElementById("menu").style.display = "none";

    createPipe();
}

function createPipe(){

    let gap = 180;

    let topHeight =
    Math.random()*180 + 80;

    pipes.push({
        x:400,
        top:topHeight,
        bottom:topHeight + gap,
        scored:false
    });
}

function flap(e){

    if(e) e.preventDefault();

    if(gameOver) return;

    bird.velocity = jumpPower;
}

document.addEventListener("keydown", flap);

canvas.addEventListener("click", flap);

canvas.addEventListener("touchstart", function(e){

    e.preventDefault();

    flap();

});

function update(){

    if(gameOver) return;

    pipeTimer++;

    if(pipeTimer >= pipeDelay){

        createPipe();

        pipeTimer = 0;
    }

    bird.velocity += gravity;

    bird.y += bird.velocity;

    for(let p of pipes){

        p.x -= 3;

        if(
            bird.x + bird.size > p.x &&
            bird.x - bird.size < p.x + 60 &&
            (
                bird.y - bird.size < p.top ||
                bird.y + bird.size > p.bottom
            )
        ){
            endGame();
        }

        if(
            p.x + 60 < bird.x &&
            !p.scored
        ){
            p.scored = true;
            score++;
        }
    }

    pipes = pipes.filter(
        p => p.x > -60
    );

    if(
        bird.y < 0 ||
        bird.y > 600
    ){
        endGame();
    }
}

function endGame(){

    gameOver = true;

    document.getElementById("menu").style.display =
    "block";
}

function restartGame(){

    startGame();
}

function draw(){

    ctx.clearRect(0,0,400,600);

    ctx.fillStyle = "green";

    for(let p of pipes){

        ctx.fillRect(
            p.x,
            0,
            60,
            p.top
        );

        ctx.fillRect(
            p.x,
            p.bottom,
            60,
            600 - p.bottom
        );
    }

    ctx.fillStyle = "yellow";

    ctx.beginPath();

    ctx.arc(
        bird.x,
        bird.y,
        bird.size,
        0,
        Math.PI*2
    );

    ctx.fill();

    ctx.fillStyle = "black";

    ctx.font = "30px Arial";

    ctx.fillText(
        "Score: " + score,
        10,
        40
    );
}

function gameLoop(){

    update();

    draw();

    requestAnimationFrame(gameLoop);
}

startGame();

gameLoop();

</script>

</body>
</html>

<!DOCTYPE html>
<html>

<head>
    <title>ALI FLAPPY BIRD</title>
</head>

<body style="
background:skyblue;
text-align:center;
font-family:Arial;
margin:0;
">

<h1>🐦 ALI FLAPPY BIRD 🐦</h1>

<p>Press SPACE to flap!</p>

<h2>Score: <span id="score">0</span></h2>

<button id="startButton" onclick="startGame()"
style="
font-size:25px;
padding:10px 20px;
border-radius:10px;
cursor:pointer;
">
START GAME
</button>

<br><br>

<canvas id="game" width="500" height="600"
style="
background:skyblue;
border:4px solid black;
">
</canvas>

<script>

let canvas = document.getElementById("game");
let ctx = canvas.getContext("2d");

let birdX = 100;
let birdY = 250;

let velocity = 0;
let gravity = 0.4;

let pipeX = 500;
let gapY = 250;

let score = 0;

let gameRunning = false;
let game;

function startGame(){

    document.getElementById("startButton").style.display = "none";

    birdY = 250;
    velocity = 0;

    pipeX = 500;

    gapY = Math.random() * 250 + 120;

    score = 0;

    document.getElementById("score").innerHTML = score;

    gameRunning = true;

    clearInterval(game);

    game = setInterval(draw, 20);
}

document.addEventListener("keydown", function(event){

    if(event.code === "Space" && gameRunning){

        event.preventDefault();

        velocity = -7;
    }

});

function draw(){

    ctx.clearRect(0,0,500,600);

    /* Sky */
    ctx.fillStyle = "skyblue";
    ctx.fillRect(0,0,500,600);

    /* Clouds */
    ctx.fillStyle = "white";
    ctx.beginPath();
    ctx.arc(80,80,25,0,Math.PI*2);
    ctx.arc(110,80,25,0,Math.PI*2);
    ctx.fill();

    ctx.beginPath();
    ctx.arc(350,120,20,0,Math.PI*2);
    ctx.arc(380,120,20,0,Math.PI*2);
    ctx.fill();

    /* Ground */
    ctx.fillStyle = "green";
    ctx.fillRect(0,550,500,50);

    /* Bird physics */
    velocity += gravity;
    birdY += velocity;

    /* Pipes move */
    pipeX -= 3;

    if(pipeX < -80){

        pipeX = 500;

        gapY = Math.random() * 250 + 120;

        score++;

        document.getElementById("score").innerHTML = score;
    }

    /* Pipes */
    ctx.fillStyle = "green";

    ctx.fillRect(pipeX,0,80,gapY-90);

    ctx.fillRect(pipeX,gapY+90,80,550);

    /* Bird body */
    ctx.fillStyle = "yellow";

    ctx.beginPath();
    ctx.arc(birdX,birdY,18,0,Math.PI*2);
    ctx.fill();

    /* Eye */
    ctx.fillStyle = "black";

    ctx.beginPath();
    ctx.arc(birdX+6,birdY-5,3,0,Math.PI*2);
    ctx.fill();

    /* Beak */
    ctx.fillStyle = "orange";

    ctx.beginPath();
    ctx.moveTo(birdX+15,birdY);
    ctx.lineTo(birdX+28,birdY-4);
    ctx.lineTo(birdX+28,birdY+4);
    ctx.fill();

    /* Top and ground collision */
    if(birdY < 18 || birdY > 532){
        gameOver();
    }

    /* Pipe collision */
    if(
        birdX + 18 > pipeX &&
        birdX - 18 < pipeX + 80
    ){

        if(
            birdY < gapY - 90 ||
            birdY > gapY + 90
        ){
            gameOver();
        }
    }

}

function gameOver(){

    clearInterval(game);

    gameRunning = false;

    alert("Game Over! Score: " + score);

}

</script>

</body>

</html>

```html
<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ALI FLAPPY BIRD</title>

<style>
body{
    margin:0;
    background:skyblue;
    text-align:center;
    font-family:Arial;
    overflow:hidden;
    touch-action:none;
}

h1{
    color:gold;
    text-shadow:0 0 10px yellow;
    margin:10px;
}

canvas{
    border:4px solid black;
    background:#87CEEB;
    width:95vw;
    max-width:400px;
    height:auto;
    touch-action:none;
}

p{
    color:black;
    font-weight:bold;
}
</style>
</head>

<body>

<h1>🐦 ALI FLAPPY BIRD 🐦</h1>

<p>Tap the screen to jump!</p>

<canvas id="game" width="400" height="600"></canvas>

<script>

const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

let bird = {
    x:80,
    y:300,
    size:18,
    velocity:0
};

let gravity = 0.45;
let jumpPower = -9;

let pipes = [];
let score = 0;

function createPipe(){

    let gap = 170;
    let topHeight = Math.random()*250 + 50;

    pipes.push({
        x:400,
        top:topHeight,
        bottom:topHeight + gap
    });
}

createPipe();

setInterval(createPipe, 1800);

function flap(e){
    if(e) e.preventDefault();
    bird.velocity = jumpPower;
}

document.addEventListener("keydown", flap);

canvas.addEventListener("click", flap);

canvas.addEventListener("touchstart", function(e){
    e.preventDefault();
    flap();
});

function update(){

    bird.velocity += gravity;
    bird.y += bird.velocity;

    for(let i=0;i<pipes.length;i++){

        let p = pipes[i];

        p.x -= 3;

        if(
            bird.x + bird.size > p.x &&
            bird.x - bird.size < p.x + 60 &&
            (
                bird.y - bird.size < p.top ||
                bird.y + bird.size > p.bottom
            )
        ){
            resetGame();
        }

        if(p.x + 60 < bird.x && !p.scored){
            p.scored = true;
            score++;
        }
    }

    pipes = pipes.filter(p => p.x > -60);

    if(bird.y < 0 || bird.y > 600){
        resetGame();
    }
}

function resetGame(){

    bird.y = 300;
    bird.velocity = 0;

    pipes = [];
    score = 0;

    createPipe();
}

function draw(){

    ctx.clearRect(0,0,400,600);

    ctx.fillStyle = "green";

    for(let p of pipes){

        ctx.fillRect(p.x,0,60,p.top);

        ctx.fillRect(
            p.x,
            p.bottom,
            60,
            600-p.bottom
        );
    }

    ctx.fillStyle = "yellow";

    ctx.beginPath();
    ctx.arc(
        bird.x,
        bird.y,
        bird.size,
        0,
        Math.PI*2
    );
    ctx.fill();

    ctx.fillStyle = "black";
    ctx.font = "30px Arial";
    ctx.fillText("Score: " + score, 10, 40);
}

function gameLoop(){
    update();
    draw();
    requestAnimationFrame(gameLoop);
}

gameLoop();

</script>

</body>
</html>

<!DOCTYPE html>
<html>

<head>
    <title>ALI FLAPPY BIRD</title>
</head>

<body style="
background:skyblue;
text-align:center;
font-family:Arial;
">

<h1>🐦 ALI FLAPPY BIRD 🐦</h1>

<p>Press SPACE to flap!</p>

<p>Score: <span id="score">0</span></p>

<button id="startButton" onclick="startGame()">
START GAME
</button>

<br><br>

<canvas id="game" width="500" height="600"
style="
background:skyblue;
border:4px solid black;
">
</canvas>

<script>

let canvas = document.getElementById("game");
let ctx = canvas.getContext("2d");

let birdX = 100;
let birdY = 250;

let velocity = 0;
let gravity = 0.4;

let pipeX = 500;
let gapY = 250;

let score = 0;

let gameRunning = false;
let game;

function startGame() {

    document.getElementById("startButton").style.display = "none";

    birdY = 250;
    velocity = 0;

    pipeX = 500;

    gapY = Math.random() * 180 + 150;

    score = 0;

    document.getElementById("score").innerHTML = score;

    gameRunning = true;

    clearInterval(game);

    game = setInterval(draw, 20);
}

document.addEventListener("keydown", function(event){

    if(event.code === "Space" && gameRunning){

        event.preventDefault();

        velocity = -6;
    }

});

function draw() {

    ctx.clearRect(0,0,500,600);

    /* Sky */
    ctx.fillStyle = "skyblue";
    ctx.fillRect(0,0,500,600);

    /* Ground */
    ctx.fillStyle = "green";
    ctx.fillRect(0,550,500,50);

    /* Bird movement */
    velocity += gravity;
    birdY += velocity;

    /* Pipes move */
    pipeX -= 2;

    if(pipeX < -70){

        pipeX = 500;

        gapY = Math.random() * 180 + 150;

        score++;

        document.getElementById("score").innerHTML = score;
    }

    /* Pipes */
    ctx.fillStyle = "green";

    ctx.fillRect(pipeX,0,70,gapY-90);

    ctx.fillRect(pipeX,gapY+90,70,550);

    /* Bird */
    ctx.fillStyle = "yellow";

    ctx.beginPath();
    ctx.arc(birdX,birdY,15,0,Math.PI*2);
    ctx.fill();

    /* Eye */
    ctx.fillStyle = "black";

    ctx.beginPath();
    ctx.arc(birdX+5,birdY-5,3,0,Math.PI*2);
    ctx.fill();

    /* Collision with top or ground */
    if(birdY < 15 || birdY > 535){
        gameOver();
    }

    /* Pipe collision */
    if(
        birdX + 15 > pipeX &&
        birdX - 15 < pipeX + 70
    ){

        if(
            birdY < gapY - 90 ||
            birdY > gapY + 90
        ){
            gameOver();
        }
    }

}

function gameOver(){

    clearInterval(game);

    gameRunning = false;

    alert("Game Over! Score: " + score);

}

</script>

</body>

</html>

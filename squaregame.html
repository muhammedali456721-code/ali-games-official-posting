```html
<!DOCTYPE html>
<html>

<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ALI SQUARE GAME</title>

<style>

body{
    margin:0;
    background:black;
    color:white;
    text-align:center;
    font-family:Arial;
    overflow-x:hidden;
    padding-bottom:150px;
}

h1{
    color:red;
    text-shadow:0 0 20px red;
}

button{
    font-size:20px;
    padding:12px 20px;
    margin:10px;
    border:none;
    border-radius:10px;
    cursor:pointer;
}

#box{
    width:70px;
    height:70px;
    background:red;
    position:absolute;
    border-radius:10px;
    display:none;
    cursor:pointer;
    box-shadow:0 0 20px red;
}

#gameOver{
    display:none;
    margin-top:20px;
}

@media(max-width:600px){

    #box{
        width:60px;
        height:60px;
    }

}

</style>

</head>

<body>

<h1>🟥 ALI SQUARE GAME 🟥</h1>

<h2>Score: <span id="score">0</span></h2>

<h2>Time: <span id="time">30</span></h2>

<button id="startButton"
onclick="startGame()">

▶ START GAME

</button>

<div id="box"
onclick="moveBox()">
</div>

<div id="gameOver">

<h2>GAME OVER!</h2>

<h3>Your Score: <span id="finalScore">0</span></h3>

<button onclick="startGame()">
🔄 PLAY AGAIN
</button>

<button onclick="window.location.href='index.html'">
🏠 ALI GAMES
</button>

</div>

<script>

let score = 0;
let time = 30;
let timer;

function startGame(){

    score = 0;
    time = 30;

    document.getElementById(
        "score"
    ).innerHTML = score;

    document.getElementById(
        "time"
    ).innerHTML = time;

    document.getElementById(
        "gameOver"
    ).style.display = "none";

    document.getElementById(
        "box"
    ).style.display = "block";

    document.getElementById(
        "startButton"
    ).style.display = "none";

    moveBox();

    clearInterval(timer);

    timer = setInterval(
        countdown,
        1000
    );
}

function countdown(){

    time--;

    document.getElementById(
        "time"
    ).innerHTML = time;

    if(time <= 0){

        clearInterval(timer);

        document.getElementById(
            "box"
        ).style.display = "none";

        document.getElementById(
            "finalScore"
        ).innerHTML = score;

        document.getElementById(
            "gameOver"
        ).style.display = "block";

        document.getElementById(
            "startButton"
        ).style.display = "inline-block";
    }
}

function moveBox(){

    score++;

    document.getElementById(
        "score"
    ).innerHTML = score;

    let maxX =
    window.innerWidth - 90;

    let maxY =
    window.innerHeight - 220;

    let x =
    Math.random() * maxX;

    let y =
    Math.random() * maxY + 120;

    document.getElementById(
        "box"
    ).style.left =
    x + "px";

    document.getElementById(
        "box"
    ).style.top =
    y + "px";

    document.body.style.background =
    "darkred";

    setTimeout(function(){

        document.body.style.background =
        "black";

    },100);
}

</script>

</body>

</html>

<!DOCTYPE html>
<html>

<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ALI HIGHWAY RACER</title>

<style>

body{
    margin:0;
    background:#222;
    color:white;
    font-family:Arial;
    text-align:center;
    overflow:hidden;
}

h1{
    color:gold;
    text-shadow:0 0 15px yellow;
    margin:10px;
}

#score{
    font-size:26px;
    margin-bottom:10px;
}

canvas{
    background:#4CAF50;
    border:4px solid white;
    width:95vw;
    max-width:420px;
    height:auto;
}

#controls{
    margin-top:15px;
}

button{
    width:90px;
    height:60px;
    margin:8px;
    font-size:28px;
    border:none;
    border-radius:12px;
    cursor:pointer;
}

#gameOver{
    display:none;
    margin-top:15px;
}

</style>

</head>

<body>

<h1>🏎️ ALI HIGHWAY RACER 🏎️</h1>

<div id="score">
Score: 0
</div>

<canvas id="game" width="400" height="700"></canvas>

<div id="controls">

<button onclick="moveLeft()">
⬅️
</button>

<button onclick="moveRight()">
➡️
</button>

</div>

<div id="gameOver">

<h2>💥 GAME OVER 💥</h2>

<button onclick="restartGame()">
🔄 Play Again
</button>

<button onclick="window.location.href='index.html'">
🏠 Menu
</button>

</div>

<script>

const canvas =
document.getElementById("game");

const ctx =
canvas.getContext("2d");

let score = 0;

let roadY = 0;

let player = {

x:170,

y:560,

width:60,

height:100,

speed:20

};

let enemies = [];

let gameRunning = true;

function moveLeft(){

player.x -= player.speed;

if(player.x < 70){

player.x = 70;

}

}

function moveRight(){

player.x += player.speed;

if(player.x > 270){

player.x = 270;

}

}

document.addEventListener("keydown",function(e){

if(e.key=="ArrowLeft"){

moveLeft();

}

if(e.key=="ArrowRight"){

moveRight();

}

});

function drawRoad(){

ctx.fillStyle="#2f2f2f";

ctx.fillRect(50,0,300,700);

ctx.fillStyle="white";

for(let i=-40;i<700;i+=80){

ctx.fillRect(

195,

i+roadY,

10,

40

);

}

roadY+=8;

if(roadY>=80){

roadY=0;

}

}

function drawPlayer(){

ctx.fillStyle="blue";

ctx.fillRect(

player.x,

player.y,

player.width,

player.height

);

ctx.fillStyle="skyblue";

ctx.fillRect(

player.x+10,

player.y+10,

40,

25

);

ctx.fillStyle="black";

ctx.fillRect(player.x+5,player.y+15,8,25);
ctx.fillRect(player.x+47,player.y+15,8,25);

ctx.fillRect(player.x+5,player.y+70,8,20);
ctx.fillRect(player.x+47,player.y+70,8,20);

  {
function spawnEnemy(){

let lanes=[70,170,270];

let lane=
lanes[Math.floor(Math.random()*3)];

enemies.push({

x:lane,

y:-120,

width:60,

height:100,

color:[
"red",
"yellow",
"lime",
"purple",
"orange"
][Math.floor(Math.random()*5)]

});

}

let spawnTimer=0;

function drawEnemies(){

for(let i=enemies.length-1;i>=0;i--){

let e=enemies[i];

e.y+=8;

ctx.fillStyle=e.color;

ctx.fillRect(
e.x,
e.y,
e.width,
e.height
);

ctx.fillStyle="skyblue";

ctx.fillRect(
e.x+10,
e.y+10,
40,
25
);

ctx.fillStyle="black";

ctx.fillRect(e.x+5,e.y+15,8,25);
ctx.fillRect(e.x+47,e.y+15,8,25);

ctx.fillRect(e.x+5,e.y+70,8,20);
ctx.fillRect(e.x+47,e.y+70,8,20);

if(

player.x < e.x+e.width &&

player.x+player.width > e.x &&

player.y < e.y+e.height &&

player.y+player.height > e.y

){

gameOver();

}

if(e.y>750){

enemies.splice(i,1);

score++;

document.getElementById("score").innerHTML=
"Score: "+score;

}

}

spawnTimer++;

if(spawnTimer>=45){

spawnEnemy();

spawnTimer=0;

}

}

function gameOver(){

gameRunning=false;

document.getElementById(
"gameOver"
).style.display="block";

}

function restartGame(){

score=0;

document.getElementById(
"score"
).innerHTML="Score: 0";

player.x=170;

enemies=[];

roadY=0;

spawnTimer=0;

gameRunning=true;

document.getElementById(
"gameOver"
).style.display="none";

gameLoop();

}

function gameLoop(){

if(!gameRunning){

return;

}

ctx.clearRect(
0,
0,
400,
700
);

drawRoad();

drawEnemies();

drawPlayer();

requestAnimationFrame(
gameLoop
);
}
